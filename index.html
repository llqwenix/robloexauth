<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloex - Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(46, 204, 113, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #2ecc71;
            background: rgba(0, 0, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            display: block;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            display: block;
        }

        .cookie-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: none;
        }

        .cookie-box label {
            margin-bottom: 5px;
            font-size: 12px;
        }

        .cookie-box input {
            font-family: monospace;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.5);
        }

        .copy-btn {
            margin-top: 10px;
            background: rgba(52, 152, 219, 0.8);
            font-size: 13px;
            padding: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo">
            <h1>ROBLOEX</h1>
            <p>Create your account</p>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>

        <div class="form-group">
            <label>HWID (Optional - leave empty for no restriction)</label>
            <input type="text" id="hwid" placeholder="Leave empty for no HWID restriction">
            <small style="color: rgba(255,255,255,0.4); font-size: 11px;">If specified, this account will only work on this computer</small>
        </div>

        <button id="registerBtn" onclick="register()">🚀 Create Account</button>

        <div id="message" class="message"></div>

        <div id="cookieBox" class="cookie-box">
            <label>🔑 Your Cookie (Save this securely!)</label>
            <input type="text" id="cookieValue" readonly>
            <button class="copy-btn" onclick="copyCookie()">📋 Copy Cookie</button>
            <small style="display: block; margin-top: 10px; color: #f39c12;">⚠️ Save this cookie! You won't see it again!</small>
        </div>

        <div class="footer">
            <p>© 2024 Robloex Launcher | Secure Authentication</p>
        </div>
    </div>

    <script>
        const GITHUB_REPO = "YOUR_GITHUB_USERNAME/robloex-auth"; // Замените на ваши данные
        const USERS_FILE_URL = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/users.json`;
        
        let generatedCookie = null;

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                if (msgDiv.className === `message ${type}`) {
                    msgDiv.style.display = 'none';
                    msgDiv.className = 'message';
                }
            }, 5000);
        }

        async function register() {
            const username = document.getElementById('username').value.trim();
            const hwid = document.getElementById('hwid').value.trim();
            
            if (!username) {
                showMessage('Please enter a username!', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('Username must be at least 3 characters!', 'error');
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Creating...';
            btn.disabled = true;
            
            try {
                // Генерируем случайный cookie
                const randomBytes = new Uint8Array(32);
                crypto.getRandomValues(randomBytes);
                const cookie = Array.from(randomBytes, b => b.toString(16).padStart(2, '0')).join('');
                
                // Создаём нового пользователя
                const newUser = {
                    username: username,
                    cookie: cookie,
                    role: "user",
                    created: new Date().toISOString(),
                    hwid: hwid || "allowed"
                };
                
                // Получаем текущий users.json
                const response = await fetch(USERS_FILE_URL);
                let usersData = await response.json();
                
                // Проверяем существование пользователя
                if (usersData.users.some(u => u.username === username)) {
                    showMessage('Username already exists!', 'error');
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }
                
                // Добавляем пользователя
                usersData.users.push(newUser);
                
                // Обновляем файл (требуется GitHub API)
                await updateUsersFile(usersData);
                
                generatedCookie = cookie;
                document.getElementById('cookieValue').value = cookie;
                document.getElementById('cookieBox').style.display = 'block';
                showMessage(`✅ Account created successfully! Save your cookie.`, 'success');
                
                // Очищаем поля
                document.getElementById('username').value = '';
                document.getElementById('hwid').value = '';
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('Registration failed! Check console for details.', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        async function updateUsersFile(usersData) {
            // Для GitHub Pages нужен Personal Access Token
            // Инструкция: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
            
            const GITHUB_TOKEN = prompt('Enter GitHub Personal Access Token (required for saving):');
            if (!GITHUB_TOKEN) {
                throw new Error('Token required');
            }
            
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(usersData, null, 2))));
            
            // Получаем SHA текущего файла
            const getFileResponse = await fetch(USERS_FILE_URL);
            const fileData = await getFileResponse.json();
            
            const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/users.json`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Add user ${usersData.users[usersData.users.length - 1].username}`,
                    content: content,
                    sha: fileData.sha
                })
            });
            
            if (!response.ok) {
                throw new Error('Failed to update file');
            }
        }
        
        function copyCookie() {
            const cookieInput = document.getElementById('cookieValue');
            cookieInput.select();
            document.execCommand('copy');
            showMessage('Cookie copied to clipboard!', 'success');
        }
        
        // Проверяем токен при загрузке
        window.onload = () => {
            console.log('Registration page ready');
        };
    </script>
</body>
</html>
