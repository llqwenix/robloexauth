<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloex - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card login-card">
            <div class="card-header">🔐 ВХОД В АККАУНТ</div>
            
            <div class="form-group">
                <label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
                <input type="text" id="username" placeholder="Введите имя пользователя">
            </div>
            <div class="form-group">
                <label>ПАРОЛЬ</label>
                <input type="password" id="password" placeholder="Введите пароль">
            </div>
            <button class="btn-primary" onclick="login()">ВОЙТИ</button>
            
            <div class="auth-footer">
                Нет аккаунта? <a href="signup.html">ЗАРЕГИСТРИРОВАТЬСЯ</a>
            </div>
        </div>
        <div class="footer">© 2024 Robloex Launcher | Secure Authentication</div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="auth.js"></script>
    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showToast('Введите имя пользователя и пароль!', 'error');
                return;
            }
            
            const result = loginUser(username, password);
            
            if (result.success) {
                saveCurrentUser({ username: result.username, role: result.role, cookie: result.cookie });
                showToast('Вход выполнен! Перенаправление...', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            } else {
                showToast(result.message, 'error');
            }
        }
        
        // Если уже залогинены, перенаправляем
        const currentUser = getCurrentUser();
        if (currentUser) {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
