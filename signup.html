<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloex - Подача заявки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-card signup-card">
            <div class="card-header">📝 ПОДАТЬ ЗАЯВКУ</div>
            
            <div class="form-group">
                <label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
                <input type="text" id="username" placeholder="Введите имя пользователя" autocomplete="off">
                <small>3-20 символов, латиница, цифры, подчёркивание</small>
            </div>
            <div class="form-group">
                <label>ПАРОЛЬ</label>
                <input type="password" id="password" placeholder="Введите пароль">
                <small>Не менее 4 символов</small>
            </div>
            <div class="form-group">
                <label>ПОДТВЕРЖДЕНИЕ ПАРОЛЯ</label>
                <input type="password" id="confirm" placeholder="Повторите пароль">
            </div>
            <button class="btn-primary" onclick="submitRequest()">📨 ОТПРАВИТЬ ЗАЯВКУ</button>
            
            <div class="info-box" style="margin-top: 20px; padding: 15px; background: rgba(0, 255, 68, 0.1); border-radius: 10px;">
                <p style="color: #00aa66; font-size: 13px;">💡 После отправки заявки дождитесь её одобрения администратором. Вы получите Cookie для входа в лаунчер.</p>
            </div>
            
            <div class="auth-footer">
                Уже есть аккаунт? <a href="login.html">ВОЙТИ</a>
            </div>
        </div>
        <div class="footer">© 2024 Robloex Launcher | Secure Authentication</div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="auth.js"></script>
    <script>
        function validateUsername(username) {
            const regex = /^[a-zA-Z0-9_]{3,20}$/;
            return regex.test(username);
        }
        
        async function submitRequest() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            if (!username || !password) {
                showToast('Заполните все поля!', 'error');
                return;
            }
            
            if (!validateUsername(username)) {
                showToast('Имя пользователя должно быть 3-20 символов (латиница, цифры, _)!', 'error');
                return;
            }
            
            if (password.length < 4) {
                showToast('Пароль должен быть не менее 4 символов!', 'error');
                return;
            }
            
            if (password !== confirm) {
                showToast('Пароли не совпадают!', 'error');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ ОТПРАВКА...';
            
            const result = createRequest(username, password);
            
            if (result.success) {
                showToast(result.message, 'success');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('confirm').value = '';
            } else {
                showToast(result.message, 'error');
            }
            
            btn.disabled = false;
            btn.textContent = '📨 ОТПРАВИТЬ ЗАЯВКУ';
        }
        
        // Если уже залогинены, перенаправляем
        const currentUser = getCurrentUser();
        if (currentUser) {
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
