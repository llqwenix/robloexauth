<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloex - Профиль</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:linear-gradient(135deg,#0a0f0a 0%,#0a2e0a 50%,#0a0f0a 100%);
            font-family:Arial,sans-serif;
            min-height:100vh;
            padding:20px
        }
        .container{max-width:800px;margin:0 auto}
        .navbar{
            background:rgba(10,30,10,0.95);
            border-radius:20px;
            padding:15px 20px;
            margin-bottom:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:10px
        }
        .logo{font-size:24px;font-weight:bold;color:#00ff88}
        .nav-links{display:flex;gap:15px}
        .nav-links a{color:#00aa66;text-decoration:none}
        .nav-links a:hover{color:#00ff88}
        .user-info{display:flex;align-items:center;gap:15px}
        .user-avatar{
            width:32px;height:32px;
            background:#00aa44;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-weight:bold;color:white
        }
        .logout-btn{
            background:#4a0a0a;border:none;color:white;
            padding:6px 12px;border-radius:10px;cursor:pointer
        }
        .glass-card{
            background:rgba(10,30,10,0.95);
            border-radius:20px;
            padding:30px;
            border:1px solid #00ff88
        }
        .card-header{font-size:24px;color:#00ff88;margin-bottom:20px}
        .info-card{
            background:rgba(0,20,0,0.6);
            border-radius:15px;
            padding:20px;
            margin-top:20px
        }
        .info-card h4{color:#00ff88;margin-bottom:15px}
        .cookie-box{
            background:rgba(0,0,0,0.5);
            border-radius:10px;
            padding:15px;
            margin-top:15px
        }
        .cookie-box input{
            width:100%;
            padding:8px;
            background:#0a1a0a;
            border:1px solid #00aa44;
            border-radius:5px;
            color:#00ff88;
            font-family:monospace;
            font-size:11px
        }
        .copy-btn{
            background:#0a4d0a;
            border:none;
            color:white;
            padding:8px;
            border-radius:5px;
            cursor:pointer;
            width:100%;
            margin-top:10px
        }
        .admin-badge{
            background:#f39c12;color:#0a0f0a;
            padding:2px 8px;border-radius:10px;font-size:10px;
            margin-left:10px
        }
        .footer{text-align:center;margin-top:20px;color:#008844}
        .admin-link {
            color: #00ff88;
            text-decoration: none;
        }
        .admin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">ROBLOEX</div>
            <div class="nav-links">
                <a href="home.html">ГЛАВНАЯ</a>
                <a href="dashboard.html" class="active">ПРОФИЛЬ</a>
            </div>
            <div id="userInfo"></div>
        </nav>
        
        <div class="glass-card">
            <div class="card-header">👤 МОЙ ПРОФИЛЬ</div>
            <div class="info-card">
                <h4>ИНФОРМАЦИЯ</h4>
                <p><strong>Имя:</strong> <span id="profileUsername" style="color:#00ff88;">-</span></p>
                <p><strong>Роль:</strong> <span id="profileRole" style="color:#00ff88;">-</span></p>
                <p><strong>Дата регистрации:</strong> <span id="profileCreated" style="color:#00ff88;">-</span></p>
            </div>
            <div class="info-card">
                <h4>🔑 КЛЮЧ ДОСТУПА (COOKIE)</h4>
                <div class="cookie-box">
                    <input type="text" id="userCookie" readonly>
                    <button class="copy-btn" onclick="copyCookie()">📋 КОПИРОВАТЬ</button>
                </div>
                <small>Используйте этот ключ для входа в лаунчер</small>
            </div>
        </div>
        
        <div class="footer">© 2024 Robloex Launcher</div>
    </div>

    <script>
        const SPREADSHEET_ID = '17dPJNS4c_eZZwWMHLrvvBwiv5N8cvQsl1yp9tl4eZ2c';
        const API_KEY = 'AIzaSyB1BBzMEXEQ-tU30RfgPB16biw08GkjXVk';
        const ADMIN_USERNAMES = ['vynzxluf', 'vzxjall'];
        
        function getCurrentUser() {
            const user = localStorage.getItem('robloex_user');
            if (!user) return null;
            try {
                return JSON.parse(user);
            } catch(e) {
                return null;
            }
        }
        
        function logout() {
            localStorage.removeItem('robloex_user');
            window.location.href = 'login.html';
        }
        
        async function getUserDataFromSheet(username) {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Лист1!A:H?key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data.values && data.values.length > 1) {
                    const headers = data.values[0];
                    const rows = data.values.slice(1);
                    for (const row of rows) {
                        if (row[0] === username) {
                            const obj = {};
                            headers.forEach((h, i) => obj[h] = row[i] || '');
                            return obj;
                        }
                    }
                }
                return null;
            } catch(e) {
                console.error(e);
                return null;
            }
        }
        
        function copyCookie() {
            const input = document.getElementById('userCookie');
            input.select();
            document.execCommand('copy');
            alert('Cookie скопирован!');
        }
        
        async function loadDashboard() {
            const user = getCurrentUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const isAdmin = ADMIN_USERNAMES.includes(user.username);
            
            // Обновляем навбар
            let adminLinkHtml = '';
            if (isAdmin) {
                adminLinkHtml = '<a href="admin.html" class="admin-link">АДМИН-ПАНЕЛЬ</a>';
            }
            
            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar">${user.username[0].toUpperCase()}</div>
                    <span>${user.username} ${isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}</span>
                    ${adminLinkHtml}
                    <button class="logout-btn" onclick="logout()">ВЫХОД</button>
                </div>
            `;
            
            // Загружаем данные из таблицы
            const userData = await getUserDataFromSheet(user.username);
            
            document.getElementById('profileUsername').textContent = user.username;
            document.getElementById('profileRole').textContent = user.role === 'admin' ? 'Администратор' : 'Пользователь';
            document.getElementById('profileCreated').textContent = userData && userData.created ? new Date(userData.created).toLocaleDateString() : 'Неизвестно';
            document.getElementById('userCookie').value = user.cookie || 'Нет cookie';
        }
        
        loadDashboard();
    </script>
</body>
</html>
