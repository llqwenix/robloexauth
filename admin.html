<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloex - Админ-панель</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:linear-gradient(135deg,#0a0f0a 0%,#0a2e0a 50%,#0a0f0a 100%);
            font-family:Arial,sans-serif;
            min-height:100vh;
            padding:20px
        }
        .container{max-width:1200px;margin:0 auto}
        .navbar{
            background:rgba(10,30,10,0.95);
            border-radius:20px;
            padding:15px 20px;
            margin-bottom:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:10px
        }
        .logo{font-size:24px;font-weight:bold;color:#00ff88}
        .nav-links{display:flex;gap:15px}
        .nav-links a{color:#00aa66;text-decoration:none}
        .nav-links a:hover{color:#00ff88}
        .user-info{display:flex;align-items:center;gap:15px}
        .user-avatar{
            width:32px;height:32px;
            background:#00aa44;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-weight:bold;color:white
        }
        .logout-btn{
            background:#4a0a0a;border:none;color:white;
            padding:6px 12px;border-radius:10px;cursor:pointer
        }
        .glass-card{
            background:rgba(10,30,10,0.95);
            border-radius:20px;
            padding:30px;
            border:1px solid #00ff88
        }
        .card-header{font-size:24px;color:#00ff88;margin-bottom:20px}
        .tab-buttons{display:flex;gap:10px;margin-bottom:20px;border-bottom:1px solid rgba(0,255,0,0.2);padding-bottom:10px;flex-wrap:wrap}
        .tab-btn{background:transparent;border:1px solid #00aa44;padding:8px 20px;border-radius:10px;cursor:pointer;color:#00aa66}
        .tab-btn.active{background:#0a4d0a;border-color:#00ff88;color:#00ff88}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .request-card,.user-card{
            background:rgba(0,20,0,0.6);
            border-radius:15px;
            padding:15px;
            margin-bottom:15px;
            border:1px solid rgba(0,255,0,0.2)
        }
        .btn-approve{background:#2ecc71;border:none;color:white;padding:5px 15px;border-radius:5px;cursor:pointer;margin-right:10px}
        .btn-deny{background:#e74c3c;border:none;color:white;padding:5px 15px;border-radius:5px;cursor:pointer}
        .btn-delete{background:#c0392b;border:none;color:white;padding:5px 15px;border-radius:5px;cursor:pointer}
        .admin-badge{background:#f39c12;color:#0a0f0a;padding:2px 8px;border-radius:10px;font-size:10px;margin-left:10px}
        .access-denied{text-align:center;padding:50px}
        .loading{text-align:center;padding:50px;color:#00aa66}
        .inline-form{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        input, select{
            background:#0a1a0a;border:1px solid #00aa44;
            padding:8px;border-radius:5px;color:#00ff88
        }
        button{cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">ROBLOEX ADMIN</div>
            <div class="nav-links">
                <a href="home.html">ГЛАВНАЯ</a>
                <a href="dashboard.html">ПРОФИЛЬ</a>
                <a href="admin.html" class="active">АДМИН-ПАНЕЛЬ</a>
            </div>
            <div id="userInfo"></div>
        </div>
        
        <div id="adminContent">
            <div class="loading">Загрузка...</div>
        </div>
        
        <div class="footer">© 2024 Robloex Launcher</div>
    </div>

    <script>
        const SPREADSHEET_ID = '17dPJNS4c_eZZwWMHLrvvBwiv5N8cvQsl1yp9tl4eZ2c';
        const API_KEY = 'AIzaSyB1BBzMEXEQ-tU30RfgPB16biw08GkjXVk';
        const ADMIN_USERNAMES = ['vynzxluf', 'vzxjall'];
        
        let currentAdmin = null;
        
        function getCurrentUser() {
            const user = localStorage.getItem('robloex_user');
            if (!user) return null;
            try {
                return JSON.parse(user);
            } catch(e) {
                return null;
            }
        }
        
        function logout() {
            localStorage.removeItem('robloex_user');
            window.location.href = 'login.html';
        }
        
        async function getSheetData(sheetName = 'Лист1', range = 'A:H') {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheetName}!${range}?key=${API_KEY}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.values && data.values.length > 1) {
                    const headers = data.values[0];
                    return data.values.slice(1).map(row => {
                        const obj = {};
                        headers.forEach((h, i) => obj[h] = row[i] || '');
                        return obj;
                    });
                }
                return [];
            } catch(e) {
                console.error(e);
                return [];
            }
        }
        
        async function getUsers() {
            return await getSheetData('Лист1', 'A:H');
        }
        
        async function loadAdminPanel() {
            const user = getCurrentUser();
            
            if (!user || !ADMIN_USERNAMES.includes(user.username)) {
                document.getElementById('adminContent').innerHTML = `
                    <div class="glass-card access-denied">
                        <div class="card-header">⛔ ДОСТУП ЗАПРЕЩЁН</div>
                        <p style="color:#e74c3c;font-size:18px;margin-bottom:20px;">У вас нет прав доступа к этой странице.</p>
                        <button class="btn-primary" onclick="window.location.href='home.html'">ВЕРНУТЬСЯ НА ГЛАВНУЮ</button>
                    </div>
                `;
                return;
            }
            
            currentAdmin = user;
            
            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar">${user.username[0].toUpperCase()}</div>
                    <span>${user.username} <span class="admin-badge">ADMIN</span></span>
                    <button class="logout-btn" onclick="logout()">ВЫХОД</button>
                </div>
            `;
            
            document.getElementById('adminContent').innerHTML = `
                <div class="glass-card">
                    <div class="card-header">👑 АДМИН-ПАНЕЛЬ</div>
                    <div class="tab-buttons">
                        <button class="tab-btn active" onclick="showTab('users')">👥 ПОЛЬЗОВАТЕЛИ</button>
                    </div>
                    <div id="usersTab" class="tab-content active">
                        <div id="usersList"><div class="loading">Загрузка...</div></div>
                    </div>
                </div>
            `;
            
            await loadUsers();
        }
        
        async function loadUsers() {
            const users = await getUsers();
            const container = document.getElementById('usersList');
            
            if (users.length === 0) {
                container.innerHTML = '<p style="color:#00aa66;">Нет пользователей</p>';
                return;
            }
            
            container.innerHTML = users.map(user => `
                <div class="user-card">
                    <p><strong>👤 ${escapeHtml(user.username)}</strong> ${ADMIN_USERNAMES.includes(user.username) ? '<span class="admin-badge">АДМИНИСТРАТОР</span>' : ''}</p>
                    <p>Роль: ${user.role === 'admin' ? 'Администратор' : 'Пользователь'}</p>
                    <p>📅 Создан: ${user.created ? new Date(user.created).toLocaleDateString() : 'Неизвестно'}</p>
                    <p>🔑 Cookie: ${user.cookie ? user.cookie.substring(0, 20) + '...' : 'Нет'}</p>
                    ${user.is_banned === 'TRUE' ? `<p style="color:#e74c3c;">🚫 Забанен</p>` : ''}
                </div>
            `).join('');
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            event.target.classList.add('active');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadAdminPanel();
    </script>
</body>
</html>
