<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloex - Главная</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:linear-gradient(135deg,#0a0f0a 0%,#0a2e0a 50%,#0a0f0a 100%);
            font-family:Arial,sans-serif;
            min-height:100vh;
            padding:20px
        }
        .container{max-width:800px;margin:0 auto}
        .navbar{
            background:rgba(10,30,10,0.95);
            border-radius:20px;
            padding:15px 20px;
            margin-bottom:20px;
            display:flex;
            justify-content:space-between;
            align-items:center
        }
        .logo{font-size:24px;font-weight:bold;color:#00ff88}
        .user-info{display:flex;align-items:center;gap:15px}
        .user-avatar{
            width:32px;height:32px;
            background:#00aa44;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-weight:bold;color:white
        }
        .logout-btn{
            background:#4a0a0a;border:none;color:white;
            padding:6px 12px;border-radius:10px;cursor:pointer
        }
        .glass-card{
            background:rgba(10,30,10,0.95);
            border-radius:20px;
            padding:30px;
            border:1px solid #00ff88
        }
        .card-header{font-size:24px;color:#00ff88;margin-bottom:20px}
        .btn-primary{
            background:#0a4d0a;border:none;color:white;
            padding:12px;border-radius:10px;cursor:pointer;
            width:100%;font-size:16px;margin-top:10px
        }
        .admin-badge{
            background:#f39c12;color:#0a0f0a;
            padding:2px 8px;border-radius:10px;font-size:10px;
            margin-left:10px
        }
        .footer{text-align:center;margin-top:20px;color:#008844}
        .admin-link {
            color: #00ff88;
            margin-left: 15px;
            text-decoration: none;
        }
        .admin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">ROBLOEX</div>
            <div id="userInfo"></div>
        </div>
        
        <div class="glass-card">
            <div class="card-header">🎮 ДОБРО ПОЖАЛОВАТЬ!</div>
            <p>Современный лаунчер для Minecraft с поддержкой модов и скинов.</p>
            <button class="btn-primary" onclick="alert('Скачивание...')">СКАЧАТЬ ЛАУНЧЕР</button>
        </div>
        
        <div class="footer">© 2024 Robloex Launcher</div>
    </div>

    <script>
        const ADMIN_USERNAMES = ['vynzxluf', 'vzxjall'];
        
        function getCurrentUser() {
            const user = localStorage.getItem('robloex_user');
            if (!user) return null;
            try {
                return JSON.parse(user);
            } catch(e) {
                return null;
            }
        }
        
        function logout() {
            localStorage.removeItem('robloex_user');
            window.location.href = 'login.html';
        }
        
        function loadHome() {
            const user = getCurrentUser();
            
            // Если нет пользователя - перенаправляем на вход
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            const isAdmin = ADMIN_USERNAMES.includes(user.username);
            const userInfo = document.getElementById('userInfo');
            
            let adminLinkHtml = '';
            if (isAdmin) {
                adminLinkHtml = '<a href="admin.html" class="admin-link">АДМИН-ПАНЕЛЬ</a>';
            }
            
            userInfo.innerHTML = `
                <div class="user-info">
                    <div class="user-avatar">${user.username[0].toUpperCase()}</div>
                    <span>${user.username} ${isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}</span>
                    ${adminLinkHtml}
                    <button class="logout-btn" onclick="logout()">ВЫХОД</button>
                </div>
            `;
        }
        
        loadHome();
    </script>
</body>
</html>
